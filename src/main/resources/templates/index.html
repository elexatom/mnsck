<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CK Information System</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen">

<div class="navbar bg-base-100 shadow-xl mb-8 rounded-box mx-auto w-11/12 mt-4">
    <div class="flex-1">
        <a class="btn btn-ghost text-xl">TravelApp Admin</a>
    </div>
    <div class="flex-none">
        <ul class="menu menu-horizontal px-1 gap-2">
            <li><a hx-get="/tours" hx-target="#main-content" class="btn btn-sm btn-ghost">Tours</a></li>
            <li><a hx-get="/customers" hx-target="#main-content" class="btn btn-sm btn-ghost">Customers</a></li>
            <li><a hx-get="/guides" hx-target="#main-content" class="btn btn-sm btn-ghost">Guides</a></li>
            <li><a hx-get="/bookings" hx-target="#main-content" class="btn btn-sm btn-primary">Bookings</a></li>
        </ul>
    </div>
</div>

<main id="main-content" class="container mx-auto p-4 bg-base-100 rounded-box shadow-xl min-h-[50vh]">
    <div class="prose max-w-none text-center py-10">
        <h1 class="text-3xl font-bold">Welcome to the CK System</h1>
        <p>Select a module from the menu above to start managing.</p>
    </div>
</main>

</body>
</html>
