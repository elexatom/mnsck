<!--
Hlavní layout pro všechny stránky. Obsah se načítá dynamicky pomocí HTMX do elementu #main-content.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>CK</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
    <script>
        document.body.addEventListener('htmx:beforeOnLoad', function (evt) {
            if (evt.detail.xhr.status === 422) {
                evt.detail.shouldSwap = true;
                evt.detail.isError = false;
            }
        });
    </script>
</head>
<body class="min-h-screen bg-base-100 text-base-content">
<div class="drawer lg:drawer-open">
    <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col">
        <div class="w-full navbar bg-base-100 lg:hidden shadow-sm">
            <div class="flex-none">
                <label for="my-drawer-2" class="btn btn-square btn-ghost drawer-button lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </label>
            </div>
            <div class="flex-1 px-2 mx-2 text-xl font-bold">TravelApp Admin</div>
        </div>
        <main id="main-content" class="p-6 md:p-10 bg-base-100 text-base-content">
            <th:block th:if="${contentTemplate != null}">
                <div th:insert="~{${contentTemplate} :: content}"></div>
            </th:block>
            <th:block th:if="${contentTemplate == null}">
                <h1 class="text-4xl font-bold mb-4">Dashboard</h1>
                <p>Vítejte v informačním systému. Vyberte modul vlevo.</p>
            </th:block>
        </main>
    </div>
    <div class="drawer-side shadow-lg z-50">
        <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
        <ul class="menu p-4 w-72 min-h-full bg-base-200 text-base-content flex flex-col gap-2">
            <li class="mb-4 hidden lg:block text-2xl font-bold p-2">CK Admin</li>
            <li><a hx-get="/" hx-target="#main-content" hx-push-url="true" class="hover:bg-base-300">Dashboard</a></li>
            <li><a hx-get="/tours" hx-target="#main-content" hx-push-url="true" class="hover:bg-base-300">Zájezdy</a></li>
            <li><a hx-get="/customers" hx-target="#main-content" hx-push-url="true" class="hover:bg-base-300">Zákazníci</a></li>
            <li><a hx-get="/guides" hx-target="#main-content" hx-push-url="true" class="hover:bg-base-300">Průvodci</a></li>
            <li><a hx-get="/bookings" hx-target="#main-content" hx-push-url="true" class="hover:bg-base-300">Rezervace</a></li>
        </ul>
    </div>
</div>
</body>
</html>
